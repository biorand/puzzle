name: Deploy to GitHub Pages

on:
  push:
    branches: [live]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: |
          mkdir -p _site/dist _site/assets
          cp index.html style.css _site/
          cp dist/app.min.js _site/dist/
          cp assets/biorand.otf _site/assets/
          cp favicon.ico favicon.png losiluminados.png _site/
          echo 'puzzle.biorand.net' > _site/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
