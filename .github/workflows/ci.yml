name: CI + Deploy

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - run: npm run e2e
      - if: github.ref == 'refs/heads/live'
        run: |
          mkdir -p _site/dist _site/assets
          cp index.html style.css _site/
          cp dist/app.min.js _site/dist/
          cp assets/biorand.otf _site/assets/
          cp favicon.ico favicon.png losiluminados.png _site/
          echo 'puzzle.biorand.net' > _site/CNAME
      - if: github.ref == 'refs/heads/live'
        uses: actions/configure-pages@v5
      - if: github.ref == 'refs/heads/live'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/live'
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
