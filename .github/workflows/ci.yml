name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm run e2e
